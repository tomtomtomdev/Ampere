<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ampere — caliper for phones</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <!--
    Ampere app shell (M4). The five screens render from the FastAPI backend (/api/*); scoring,
    dedup, and the Pareto frontier live in the Python domain layer and are NEVER re-implemented
    here — JS only does pixel geometry, client-side filtering, and sorting.
    Design of record: design/Ampere.dc.html.
  -->
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-row">
          <span class="brand-dot"></span>
          <span class="brand-name">AMPERE</span>
        </div>
        <div class="brand-sub">caliper for phones · Shopee ID</div>
      </div>

      <nav class="nav" id="nav">
        <button class="nav-item active" data-screen="dashboard">
          <span class="bar"></span><span class="label">Dashboard</span><span class="badge" data-badge="dashboard"></span>
        </button>
        <button class="nav-item" data-screen="listings">
          <span class="bar"></span><span class="label">Listings</span><span class="badge" data-badge="listings">—</span>
        </button>
        <button class="nav-item" data-screen="catalog">
          <span class="bar"></span><span class="label">Catalog</span><span class="badge" data-badge="catalog">—</span>
        </button>
        <button class="nav-item" data-screen="changes">
          <span class="bar"></span><span class="label">Watchlist</span><span class="badge" data-badge="changes">—</span>
        </button>
        <button class="nav-item" data-screen="settings">
          <span class="bar"></span><span class="label">Settings</span><span class="badge" data-badge="settings"></span>
        </button>
      </nav>

      <div class="sidebar-footer">
        snapshot <span id="foot-snapshot">—</span><br />
        scoring <span id="foot-version">v2.1.0</span><br />
        frontier per-condition
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="chips">
          <span class="chip">keyword: <span class="accent" id="chip-keyword">—</span></span>
          <span class="chip" id="chip-band">band: —</span>
          <span class="chip">Shopee.co.id</span>
        </div>
        <div class="stats">
          <span>raw <span id="stat-raw">—</span></span>
          <span>deduped <span id="stat-deduped">—</span></span>
          <span class="accent">matched <span id="stat-matched">—</span>%</span>
          <span class="schedule-pill" title="Scheduled daily — no manual trigger">
            <span class="schedule-dot"></span>AUTO · <span id="stat-schedule">daily 06:00 WIB</span>
          </span>
        </div>
      </header>

      <main class="content" id="content"></main>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
